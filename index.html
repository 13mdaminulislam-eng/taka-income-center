<!-- এই অংশটি আপনার 'কাজ' পেজের কার্ডের ভেতরে বসান -->
<div class="card">
    <h3>📢 চ্যানেল জয়েন বোনাস</h3>
    <p>প্রতিটি চ্যানেল বা ইউটিউবে সাবস্ক্রাইব করে <b style="color: #10b981;">৳ ৫০.০০</b> বোনাস নিন!</p>
    
    <button class="btn-action btn-success" id="btn-bonus1" onclick="claimBonus('bonus1', 'https://t.me/AK26269', 50)">টিজি চ্যানেল ১-এ জয়েন করুন (+৫০৳)</button>
    <button class="btn-action btn-success" id="btn-bonus2" onclick="claimBonus('bonus2', 'https://t.me/ma162699', 50)">টিজি চ্যানেল ২-এ জয়েন করুন (+৫০৳)</button>
    <button class="btn-action" style="background-color: #ff0000;" id="btn-bonus3" onclick="claimBonus('bonus3', 'https://youtube.com/@ad16269a?si=I5bdhNM4rPJdvMpS', 50)">ইউটিউব সাবস্ক্রাইব করুন (+৫০৳)</button>
</div>

<script>
    // বোনাস ক্লেইম করার ফাংশন
    function claimBonus(id, url, amount) {
        // চেক করা হচ্ছে ইউজার আগে এটি নিয়েছে কি না
        if (localStorage.getItem(id) === 'claimed') {
            tg.showAlert("⚠️ আপনি এই বোনাসটি আগেই নিয়ে নিয়েছেন!");
            window.open(url, '_blank');
            return;
        }

        // লিংকে পাঠানো হচ্ছে
        try {
            tg.openLink(url);
        } catch(e) {
            window.open(url, '_blank');
        }

        // বোনাস ব্যালেন্সে যোগ করা
        userBalance += amount;
        localStorage.setItem(id, 'claimed'); // স্টোরেজে সেভ করা হলো
        
        // বাটনটি ডিসেবল করা
        document.getElementById('btn-' + id).innerText = "✅ বোনাস গৃহীত";
        document.getElementById('btn-' + id).style.opacity = "0.5";
        
        updateUI(true); // ডেটা সেভ ও আপডেট
        tg.showAlert(`🎉 অভিনন্দন! আপনি সফলভাবে ${amount} টাকা বোনাস পেয়েছেন।`);
    }

    // পেজ লোড হওয়ার সময় বাটনগুলোর স্ট্যাটাস আপডেট করা
    window.onload = function() {
        ['bonus1', 'bonus2', 'bonus3'].forEach(id => {
            if (localStorage.getItem(id) === 'claimed') {
                const btn = document.getElementById('btn-' + id);
                if(btn) {
                    btn.innerText = "✅ বোনাস গৃহীত";
                    btn.style.opacity = "0.5";
                }
            }
        });
    };
</script>
