<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADDS JOB CITY 💼</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='11149595' data-sdk='show_11149595'></script>

    <style>
        :root { --primary: #7c3aed; --bg: #f8f9fe; --text: #1f2937; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding-bottom: 80px; color: var(--text); }
        
        /* Header */
        .header { background: white; padding: 15px; font-weight: bold; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; font-size: 18px; }
        
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        
        /* Card & UI */
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; text-align: center; }
        .balance-card { background: #7c3aed; color: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; text-align: center; }
        
        /* Buttons */
        .btn-action { background-color: #ff4757; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-purple { background-color: #7c3aed; color: white; }
        
        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { font-size: 11px; color: #666; cursor: pointer; text-align: center; font-weight: bold; }
        .nav-item.active { color: #7c3aed; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">ADDS JOB CITY 💼</div>

    <div id="page-home" class="page active">
        <div class="balance-card">
            <p>মোট ব্যালেন্স</p>
            <h1 id="main-balance">৳ 0.00</h1>
        </div>
        <div class="card" onclick="switchPage('wallet', document.querySelectorAll('.nav-item')[4])">
            <div style="font-size: 18px; font-weight: bold;">💰 পেমেন্ট মেথড চেক করুন</div>
        </div>
    </div>
    
    <div id="page-work" class="page">
        <div class="card">
            <h3>📢 বিজ্ঞাপন টাস্ক</h3>
            <p>প্রতি ভিডিওতে ৳২০.০০</p>
            <div style="background: #f0edff; padding: 15px; border-radius: 15px; margin: 15px 0;">আজকের টাস্ক: <b id="task-count">0</b>/৩০</div>
            <button class="btn-action" onclick="watchRealAd()">বিজ্ঞাপন দেখুন</button>
        </div>
        <div class="card">
            <p>অফিসিয়াল চ্যানেল</p>
            <button class="btn-action btn-purple" id="btn-chan1" onclick="claimChannelBonus('chan1', 'https://t.me/ad16269')">জয়েন চ্যানেল ১</button>
        </div>
    </div>
    
    <div id="page-support" class="page">
        <div class="card">
            <h3>🎧 কাস্টমার সাপোর্ট</h3>
            <button class="btn-action" onclick="window.open('https://t.me/as16269bot')">সাপোর্ট বটে যোগাযোগ</button>
        </div>
    </div>
    
    <div id="page-refer" class="page">
        <div class="card">
            <h3>👥 রেফার করুন</h3>
            <p>প্রতি রেফারে ১১১.০০ টাকা</p>
            <input type="text" id="refer-link" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;" readonly>
            <button class="btn-action btn-purple" onclick="copyRefer()">লিংক কপি করুন</button>
        </div>
    </div>
    
    <div id="page-wallet" class="page">
        <div class="card">
            <h3>💳 টাকা উত্তোলন</h3>
            <p>ব্যালেন্স: ৳<span id="wallet-balance">0.00</span></p>
            <select id="payment-method" style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;"><option value="bkash">বিকাশ</option><option value="nagad">নগদ</option></select>
            <input type="number" id="withdraw-number" placeholder="আপনার নাম্বার" style="width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd;">
            <input type="number" id="withdraw-amount" placeholder="পরিমাণ (মিনিমাম ৫০০)" style="width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd;">
            <button class="btn-action btn-purple" onclick="processWithdraw()">অনুরোধ পাঠান</button>
        </div>
    </div>
    
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchPage('home', this)"><div class="nav-icon">🏠</div>হোম</div>
        <div class="nav-item" onclick="switchPage('work', this)"><div class="nav-icon">📋</div>কাজ</div>
        <div class="nav-item" onclick="switchPage('support', this)"><div class="nav-icon">🎧</div>সাপোর্ট</div>
        <div class="nav-item" onclick="switchPage('refer', this)"><div class="nav-icon">👥</div>রেফার</div>
        <div class="nav-item" onclick="switchPage('wallet', this)"><div class="nav-icon">💳</div>ওয়ালেট</div>
    </div>

    <script>
        // আপনার দেওয়া মূল লজিকটি এখানে আগের মতোই কাজ করবে
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "guest";
        let userBalance = 0, totalTasks = 0, totalRefers = 0;

        function loadAllData() {
            tg.CloudStorage.getItem('bal_' + userId, (err, val) => { if(!err && val) { userBalance = parseFloat(val); updateUI(false); } });
            tg.CloudStorage.getItem('task_' + userId, (err, val) => { if(!err && val) { totalTasks = parseInt(val); updateUI(false); } });
            tg.CloudStorage.getItem('refers_' + userId, (err, val) => { if(!err && val) { totalRefers = parseInt(val); updateUI(false); } });
            document.getElementById('refer-link').value = "https://t.me/TakaInkam1626_bot?start=" + userId;
        }

        function updateUI(shouldSave = true) {
            document.getElementById('main-balance').innerText = "৳ " + userBalance.toFixed(2);
            document.getElementById('wallet-balance').innerText = userBalance.toFixed(2);
            document.getElementById('task-count').innerText = totalTasks;
            if (shouldSave) {
                tg.CloudStorage.setItem('bal_' + userId, userBalance.toString());
                tg.CloudStorage.setItem('task_' + userId, totalTasks.toString());
            }
        }

        function watchRealAd() {
            if(totalTasks >= 30) { tg.showAlert("আজকের টাস্ক লিমিট শেষ!"); return; }
            if (typeof show_11149595 === 'function') {
                show_11149595().then(() => {
                    userBalance += 20; totalTasks++; updateUI(true);
                    tg.showAlert("২০ টাকা যোগ হয়েছে!");
                });
            }
        }

        function switchPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function copyRefer() { document.getElementById("refer-link").select(); document.execCommand("copy"); tg.showAlert("লিংক কপি হয়েছে!"); }

        function processWithdraw() {
            if (totalRefers < 11) { tg.showAlert("উত্তোলনের জন্য ১১টি রেফার প্রয়োজন!"); return; }
            tg.showPopup({title: 'অ্যাকাউন্ট অ্যাক্টিভ', message: 'অ্যাকাউন্ট অ্যাক্টিভ করতে ১১১ টাকা পেমেন্ট করুন।', buttons: [{id: 's', text: 'পেমেন্ট করুন'}]}, (id) => { if(id) tg.openLink("https://t.me/ks162699bot"); });
        }

        window.onload = loadAllData;
    </script>
</body>
</html>
