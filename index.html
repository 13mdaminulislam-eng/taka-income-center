<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>টাকা ইনকাম সেন্টার</title>

<style>

body{
margin:0;
background:#f5f6fa;
font-family:sans-serif;
}

.header{
background:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#0d1b4c;
}

.profile{
background:white;
padding:20px;
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:60px;
height:60px;
border-radius:50%;
background:#2563ff;
}

.balance{
margin:20px;
padding:30px;
border-radius:25px;
background:linear-gradient(90deg,#4f7cff,#2163ff);
color:white;
}

.balance h1{
font-size:55px;
margin:10px 0;
}

.notice{
margin:20px;
padding:15px;
background:white;
border-radius:15px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
cursor:pointer;
}

.card h3{
margin:10px 0;
}

.card p{
font-size:35px;
font-weight:bold;
margin:0;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.menu{
text-align:center;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
🚀 টাকা ইনকাম সেন্টার 🚀
</div>

<div class="profile">
<div class="logo"></div>
<h2>অনুমতি ✓</h2>
</div>

<div class="balance">
<p>মোট ব্যালেন্স</p>
<h1>৳0.00</h1>
</div>

<div class="notice">
🎉 নতুন আপডেট স্বাগতম
</div>

<div class="grid">

<div class="card">
<h3>⚡ মোট টাস্ক</h3>
<p>0</p>
</div>

<div class="card">
<h3>👥 মোট রেফার</h3>
<p>0</p>
</div>

<div class="card">
<h3>📺 বিজ্ঞাপন দেখা</h3>
<p>0</p>
</div>

<div class="card">
<h3>💰 বোনাস ব্যালেন্স</h3>
<p>৳0.00</p>
</div>

</div>

<div class="bottom">

<div class="menu">
🏠<br>হোম
</div>

<div class="menu">
📋<br>কাজ
</div>

<div class="menu">
🎧<br>সাপোর্ট
</div>

<div class="menu">
👥<br>রেফার
</div>

<div class="menu">
💳<br>ওয়ালেট
</div>

</div>

</body>
</html>
