<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 টাকা ইনকাম সেন্টার</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="//libtl.com/sdk.js" data-zone="11149595" data-sdk="show_11149595"></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0b1220,#111827);
color:white;
padding-bottom:90px;
}

/* HEADER */
.header{
text-align:center;
padding:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}
.header h1{
margin:0;
font-size:22px;
}
.header p{
font-size:13px;
opacity:0.8;
}

/* PAGE */
.page{display:none;padding:15px;}
.page.active{display:block;animation:fade .3s ease;}
@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
padding:15px;
border-radius:16px;
margin-bottom:12px;
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.08);
}

/* BALANCE */
.balance{
font-size:38px;
font-weight:bold;
color:#38bdf8;
}

/* BUTTON */
.btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}
.btn:hover{transform:scale(1.02);}
.btn-primary{background:#6366f1;color:white;}
.btn-success{background:#22c55e;color:white;}
.btn-danger{background:#ef4444;color:white;}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.stat{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:12px;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
}

/* INPUT */
.input{
width:100%;
padding:11px;
margin-top:8px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:rgba(10,15,30,0.95);
backdrop-filter:blur(10px);
padding:10px 0;
justify-content:space-around;
border-top:1px solid rgba(255,255,255,0.1);
}
.nav div{
font-size:12px;
text-align:center;
color:#94a3b8;
cursor:pointer;
}
.nav .active{color:#38bdf8;}
</style>
</head>

<body>

<div class="header">
<h1>🚀 টাকা ইনকাম সেন্টার</h1>
<p>🎁 আগে ইনকাম পরে কাজ 🎁</p>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<div>মোট ব্যালেন্স</div>
<div class="balance">৳ <span id="bal">0</span></div>
</div>

<div class="card">
<h3>📢 লাইভ আপডেট</h3>
<p id="notice">লোড হচ্ছে...</p>
</div>

<div class="card">
<h3>📊 স্ট্যাটস</h3>
<div class="stats">
<div class="stat">টাস্ক<br><b id="task">0</b></div>
<div class="stat">রেফার<br><b id="ref">0</b></div>
<div class="stat">দেখা<br><b id="watched">0</b></div>
<div class="stat">বাকি<br><b id="remain">30</b></div>
</div>
</div>

</div>

<!-- WORK -->
<div id="work" class="page">

<div class="card">
<h3>📺 ভিডিও টাস্ক</h3>
<p>প্রতি ভিডিও = ৳20</p>

<h2 id="taskCount">0 / 30</h2>

<button class="btn btn-primary" onclick="watchAd()">Ad দেখুন</button>
</div>

<div class="card">
<h3>🎁 চ্যানেল বোনাস</h3>

<button id="btn-chan1" class="btn btn-primary" onclick="bonus('chan1','https://t.me/ad16269')">চ্যানেল 1</button>
<button id="btn-chan2" class="btn btn-primary" onclick="bonus('chan2','https://t.me/AK26269')">চ্যানেল 2</button>
<button id="btn-yt" class="btn btn-danger" onclick="bonus('yt','https://youtube.com/@ad16269a')">YouTube</button>

</div>
</div>

<!-- SUPPORT -->
<div id="support" class="page">
<div class="card">
<h3>🎧 সাপোর্ট</h3>
<a href="https://t.me/as16269bot"><button class="btn btn-success">Bot</button></a>
<a href="https://t.me/ad16269"><button class="btn btn-primary">Channel</button></a>
</div>
</div>

<!-- REFER -->
<div id="refer" class="page">
<div class="card">
<h3>👥 Refer</h3>
<input class="input" id="refLink" readonly>
<button class="btn btn-primary" onclick="copyRef()">Copy</button>
</div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
<div class="card">
<h3>💳 Withdraw</h3>

<input class="input" id="num" placeholder="Number">
<input class="input" id="amt" placeholder="Amount">

<button class="btn btn-success" onclick="withdraw()">Request</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="nav('home',this)" class="active">🏠</div>
<div onclick="nav('work',this)">📺</div>
<div onclick="nav('support',this)">🎧</div>
<div onclick="nav('refer',this)">👥</div>
<div onclick="nav('wallet',this)">💳</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const userId = tg.initDataUnsafe?.user?.id || "guest";

/* ===== ORIGINAL LOGIC (UNCHANGED) ===== */
let bal=0, task=0, ref=0;

const notices=[
"বিকাশ ৳500 উত্তোলন করেছে",
"নগদ ৳700 পেমেন্ট",
"User earned money"
];

let i=0;

function update(){
document.getElementById("bal").innerText=bal.toFixed(2);
document.getElementById("task").innerText=task;
document.getElementById("ref").innerText=ref;
document.getElementById("watched").innerText=task;
document.getElementById("remain").innerText=Math.max(30-task,0);
document.getElementById("taskCount").innerText=task+" / 30";

tg.CloudStorage.setItem("bal_"+userId,bal.toString());
tg.CloudStorage.setItem("task_"+userId,task.toString());
tg.CloudStorage.setItem("ref_"+userId,ref.toString());
}

function load(){
tg.CloudStorage.getItem("bal_"+userId,(e,v)=>{if(v)bal=parseFloat(v)||0;update();});
tg.CloudStorage.getItem("task_"+userId,(e,v)=>{if(v)task=parseInt(v)||0;update();});
tg.CloudStorage.getItem("ref_"+userId,(e,v)=>{if(v)ref=parseInt(v)||0;update();});

document.getElementById("refLink").value="https://t.me/TakaInkam1626_bot?start="+userId;

setInterval(()=>{
document.getElementById("notice").innerText=notices[i];
i=(i+1)%notices.length;
},3000);
}

function watchAd(){
if(task>=30){tg.showAlert("Limit reached");return;}

if(typeof show_11149595==="function"){
show_11149595().then(()=>{
bal+=20;task++;
update();
tg.showAlert("৳20 যোগ হয়েছে");
});
}
}

function bonus(id,url){
if(localStorage.getItem(id+userId)==="done"){
window.open(url);return;
}
bal+=50;
localStorage.setItem(id+userId,"done");
update();
tg.showAlert("৳50 bonus added");
window.open(url);
}

function withdraw(){
let n=document.getElementById("num").value;
let a=parseFloat(document.getElementById("amt").value);

if(!n||!a){tg.showAlert("Fill all");return;}
if(a<500){tg.showAlert("Min 500");return;}
if(a>bal){tg.showAlert("Low balance");return;}

tg.showPopup({
title:"Withdraw",
message:"Request sent",
buttons:[{type:"ok"}]
});
}

function copyRef(){
navigator.clipboard.writeText(document.getElementById("refLink").value);
tg.showAlert("Copied");
}

function nav(id,el){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav div").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
}

load();
</script>

</body>
</html>
